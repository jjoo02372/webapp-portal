<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>학습 웹앱 포털</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="header">
    <div class="container">
      <div class="header-inner">
        <div class="logo">
          <span class="logo-icon">📚</span>
          <span class="logo-text">학습 웹앱 포털</span>
        </div>
        <nav class="nav">
          <a href="#portal" class="nav-link" id="nav-portal">포털</a>
          <a href="#manage" class="nav-link" id="nav-manage">앱 관리</a>
        </nav>
      </div>
    </div>
  </header>

  <!-- 포털 뷰 -->
  <main id="view-portal" class="view">
    <div class="container">
      <div class="portal-hero">
        <h2>수업 준비 앱 모음</h2>
        <p>직접 만든 학습용 웹앱을 모아두는 교사 전용 포털입니다.</p>
      </div>

      <div class="filter-bar">
        <input type="text" id="search-input" class="search-input" placeholder="앱 이름 또는 설명으로 검색…">
        <select id="filter-subject" class="filter-select">
          <option value="">전체 과목</option>
        </select>
        <select id="filter-tag" class="filter-select">
          <option value="">전체 태그</option>
        </select>
      </div>

      <p class="results-info"><span id="app-count">0</span>개의 앱</p>

      <div class="card-grid" id="card-grid"></div>

      <div class="empty-state" id="empty-state">
        <div class="empty-icon">🗂️</div>
        <p>아직 등록된 앱이 없습니다.</p>
        <a href="#manage" class="btn btn-primary">첫 앱 추가하기</a>
      </div>
    </div>
  </main>

  <!-- 관리 뷰 -->
  <main id="view-manage" class="view hidden">
    <div class="container">
      <h2 class="section-title">앱 등록 / 관리</h2>

      <div class="form-card">
        <h3 id="form-title">새 앱 추가</h3>
        <form id="app-form" novalidate>
          <input type="hidden" id="edit-id">
          <div class="form-grid">
            <div class="form-group">
              <label for="input-name">앱 이름 <span class="required">*</span></label>
              <input type="text" id="input-name" placeholder="예: 통계 탐구 도구" required>
            </div>
            <div class="form-group">
              <label for="input-url">URL <span class="required">*</span></label>
              <input type="url" id="input-url" placeholder="https://…" required>
            </div>
            <div class="form-group">
              <label for="input-subject">과목</label>
              <input type="text" id="input-subject" placeholder="예: 수학, 과학">
            </div>
            <div class="form-group">
              <label for="input-unit">단원</label>
              <input type="text" id="input-unit" placeholder="예: 통계와 확률">
            </div>
            <div class="form-group full">
              <label for="input-description">설명</label>
              <textarea id="input-description" rows="2" placeholder="앱에 대한 간단한 설명"></textarea>
            </div>
            <div class="form-group full">
              <label for="input-tags">태그 <span class="hint">(쉼표로 구분)</span></label>
              <input type="text" id="input-tags" placeholder="예: 데이터분석, 시각화, 인터랙티브">
            </div>
            <div class="form-group full">
              <label for="input-thumbnail">썸네일 이미지 URL <span class="hint">(선택)</span></label>
              <input type="url" id="input-thumbnail" placeholder="https://…">
            </div>
          </div>
          <div class="form-error" id="form-error"></div>
          <div class="form-actions">
            <button type="submit" class="btn btn-primary" id="submit-btn">추가하기</button>
            <button type="button" class="btn btn-secondary hidden" id="cancel-btn">취소</button>
          </div>
        </form>
      </div>

      <div class="table-card">
        <div class="table-header">
          <h3>등록된 앱 목록</h3>
          <div class="table-actions">
            <span class="badge" id="manage-count">0개</span>
            <button class="btn btn-outline btn-sm" id="export-csv-btn">CSV 내보내기</button>
            <button class="btn btn-outline btn-sm" id="export-json-btn">JSON 내보내기</button>
            <label class="btn btn-outline btn-sm" for="import-file">JSON 가져오기</label>
            <input type="file" id="import-file" accept=".json" class="hidden">
            <button class="btn btn-danger-outline btn-sm" id="clear-btn">전체 초기화</button>
          </div>
        </div>

        <div class="table-wrapper">
          <table class="app-table">
            <thead>
              <tr>
                <th>앱 이름</th>
                <th>과목</th>
                <th>단원</th>
                <th>태그</th>
                <th>URL</th>
                <th>관리</th>
              </tr>
            </thead>
            <tbody id="app-table-body"></tbody>
          </table>
          <p class="table-empty hidden" id="table-empty">등록된 앱이 없습니다.</p>
        </div>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="container">
      <div class="footer-inner">
        <div class="footer-links">
          <a href="pages/privacy.html" target="_blank">개인정보 처리방침</a>
          <span class="divider">·</span>
          <a href="pages/terms.html" target="_blank">이용약관</a>
          <span class="divider">·</span>
          <a href="mailto:kkd02373@gmail.com" id="footer-contact">문의 · 주은영</a>
        </div>
        <p class="footer-date">시행일: 2026년 6월 27일</p>
      </div>
    </div>
  </footer>

  <!-- 삭제 확인 모달 -->
  <div class="modal-overlay hidden" id="modal-overlay">
    <div class="modal">
      <h3>앱 삭제</h3>
      <p id="modal-message">이 앱을 삭제하시겠습니까?</p>
      <div class="modal-actions">
        <button class="btn btn-danger" id="modal-confirm">삭제</button>
        <button class="btn btn-secondary" id="modal-cancel">취소</button>
      </div>
    </div>
  </div>

  <div class="toast hidden" id="toast"></div>

  <script src="js/app.js"></script>
</body>
</html>
